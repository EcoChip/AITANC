<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aitanc | System Optimization</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-color: #d4af37; /* Oro cepillado */
            --text-color: #ffffff;
            --sub-text: #888888;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-tag {
            display: inline-block;
            padding: 5px 12px;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            border-radius: 2px;
            animation: pulse 2s infinite;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 300;
            margin-bottom: 20px;
            color: var(--text-color);
        }

        p {
            color: var(--sub-text);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        /* Animación del Nodo Central */
        .loader {
            width: 40px;
            height: 40px;
            margin: 40px auto;
            position: relative;
        }

        .loader:before, .loader:after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 2px solid transparent;
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }

        .loader:after {
            border-top-color: #fff;
            animation-duration: 2s;
            transform: scale(0.7);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.7rem;
            color: #333;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">aitanc</div>
        <div class="status-tag">Infraestructura en Calibración</div>
        
        <h1>Optimizando nodos de auditoría técnica.</h1>
        <p>Estamos realizando un despliegue de alta disponibilidad para mejorar los tiempos de respuesta del backend. El acceso al terminal operativo estará disponible brevemente.</p>
        
        <div class="loader"></div>
    </div>

    <div class="footer">
        © 2026 AITANC SYSTEMS. ALL RIGHTS RESERVED.
    </div>

</body>
</html>
