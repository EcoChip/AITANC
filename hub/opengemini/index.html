<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenGemini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #131314; color: #e3e3e3; font-family: 'Segoe UI', sans-serif; }
        .sidebar { background-color: #1e1f20; }
        .chat-input { background-color: #1e1f20; border-radius: 28px; }
        .active-chat { background-color: #333537; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #333537; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Barra Lateral -->
    <aside class="sidebar w-64 flex flex-col p-4">
        <button onclick="newChat()" class="w-full py-3 px-4 rounded-full flex items-center gap-3 mb-6 bg-[#333537] hover:bg-[#3f4143] transition">
            <i class="fa-solid fa-plus"></i> <span>Nuevo chat</span>
        </button>
        <div class="flex-1 overflow-y-auto" id="chat-history">
            <p class="text-xs font-semibold text-gray-500 mb-4 px-2">Recientes</p>
        </div>
        <div class="mt-auto pt-4 border-t border-gray-700">
            <button onclick="configAPI()" class="text-xs text-gray-400 hover:text-white transition">
                <i class="fa-solid fa-key"></i> Configurar API Key
            </button>
            <div class="text-blue-400 font-bold mt-2">OpenGemini</div>
        </div>
    </aside>

    <!-- Contenido Principal -->
    <main class="flex-1 flex flex-col relative">
        <header class="p-4 flex justify-between items-center">
            <select id="model-select" class="bg-transparent text-xl font-medium outline-none cursor-pointer">
                <option value="gemini-1.5-flash" class="bg-[#1e1f20]">Gemini Fast</option>
                <option value="gemini-2.0-flash-thinking-exp" class="bg-[#1e1f20]">Gemini Reasoning</option>
                <option value="gemini-1.5-pro" class="bg-[#1e1f20]">Gemini Pro</option>
            </select>
        </header>

        <div id="chat-window" class="flex-1 overflow-y-auto px-4 md:px-20 py-10 space-y-6">
            <div class="text-center mt-20"><h1 class="text-4xl font-medium">¿En qué puedo ayudarte?</h1></div>
        </div>

        <div class="p-4 md:px-20 pb-8">
            <div class="chat-input flex items-center px-6 py-3 max-w-4xl mx-auto border border-transparent focus-within:border-gray-600">
                <input id="user-input" type="text" placeholder="Escribe aquí..." class="bg-transparent flex-1 outline-none" onkeypress="if(event.key === 'Enter') sendMessage()">
                <button onclick="sendMessage()" class="ml-4 text-blue-400"><i class="fa-solid fa-paper-plane text-xl"></i></button>
            </div>
        </div>
    </main>

    <script>
        let chats = JSON.parse(localStorage.getItem('opengemini_chats')) || [];
        let apiKey = localStorage.getItem('opengemini_key') || "";
        let currentChatId = null;

        function configAPI() {
            const key = prompt("Pega tu Gemini API Key aquí (se guardará en este navegador):", apiKey);
            if (key !== null) {
                apiKey = key;
                localStorage.setItem('opengemini_key', key);
            }
        }

        function renderHistory() {
            const container = document.getElementById('chat-history');
            container.innerHTML = '<p class="text-xs font-semibold text-gray-500 mb-4 px-2">Recientes</p>';
            chats.forEach(chat => {
                const div = document.createElement('div');
                div.className = `group flex items-center justify-between p-2 rounded-lg cursor-pointer hover:bg-[#333537] ${chat.id === currentChatId ? 'active-chat' : ''}`;
                div.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden flex-1" onclick="loadChat('${chat.id}')">
                        <i class="fa-regular fa-message text-sm text-gray-400"></i>
                        <span class="truncate text-sm">${chat.title}</span>
                    </div>
                    <div class="hidden group-hover:flex gap-2 ml-2">
                        <i class="fa-solid fa-pen text-[10px] text-gray-400 hover:text-white" onclick="event.stopPropagation(); renameChat('${chat.id}')"></i>
                        <i class="fa-solid fa-trash text-[10px] text-gray-400 hover:text-red-400" onclick="event.stopPropagation(); deleteChat('${chat.id}')"></i>
                    </div>`;
                container.appendChild(div);
            });
        }

        function newChat() {
            currentChatId = Date.now().toString();
            chats.unshift({ id: currentChatId, title: 'Nuevo chat', messages: [] });
            save(); renderHistory(); clearWindow();
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            const model = document.getElementById('model-select').value;

            if (!text) return;
            if (!apiKey) { configAPI(); return; }
            if (!currentChatId) newChat();

            const chat = chats.find(c => c.id === currentChatId);
            if (chat.messages.length === 0) chat.title = text.substring(0, 25);
            
            chat.messages.push({ role: 'user', content: text });
            input.value = '';
            displayMessages(chat.messages);

            // Mostrar estado "Escribiendo..."
            const win = document.getElementById('chat-window');
            const loadingDiv = document.createElement('div');
            loadingDiv.id = "loading";
            loadingDiv.innerHTML = `<div class="max-w-3xl mx-auto"><div class="text-gray-500 animate-pulse text-sm">OpenGemini está pensando...</div></div>`;
            win.appendChild(loadingDiv);

            try {
                const response = await fetch(`https://googleapis.com{model}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });
                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                
                chat.messages.push({ role: 'model', content: aiText });
            } catch (error) {
                chat.messages.push({ role: 'model', content: "Error: No se pudo conectar con la API. Verifica tu Key." });
            }

            document.getElementById('loading').remove();
            save(); renderHistory(); displayMessages(chat.messages);
        }

        function displayMessages(msgs) {
            const win = document.getElementById('chat-window');
            if (msgs.length === 0) { clearWindow(); return; }
            win.innerHTML = msgs.map(m => `
                <div class="max-w-3xl mx-auto ${m.role === 'user' ? 'flex justify-end' : ''}">
                    <div class="p-4 rounded-2xl ${m.role === 'user' ? 'bg-[#333537] max-w-[80%]' : 'w-full'} whitespace-pre-wrap">
                        ${m.role === 'model' ? `<i class="fa-solid fa-robot text-blue-400 mr-2 mb-2"></i>` : ''}
                        ${m.content}
                    </div>
                </div>`).join('');
            win.scrollTo(0, win.scrollHeight);
        }

        function loadChat(id) { 
            currentChatId = id; 
            const chat = chats.find(c => c.id === id);
            displayMessages(chat.messages); 
            renderHistory(); 
        }

        function renameChat(id) { 
            const n = prompt("Nuevo nombre para el chat:"); 
            if(n){ chats.find(c => c.id === id).title = n; save(); renderHistory(); } 
        }

        function deleteChat(id) { 
            chats = chats.filter(c => c.id !== id); 
            if (currentChatId === id) { currentChatId = null; clearWindow(); }
            save(); renderHistory(); 
        }

        function clearWindow() { 
            document.getElementById('chat-window').innerHTML = '<div class="text-center mt-20"><h1 class="text-4xl font-medium">¿En qué puedo ayudarte?</h1></div>'; 
        }

        function save() { 
            localStorage.setItem('opengemini_chats', JSON.stringify(chats)); 
        }

        // Inicializar
        if (chats.length > 0) {
            renderHistory();
        }
    </script>
</body>
</html>
