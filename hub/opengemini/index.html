<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenGemini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #131314; color: #e3e3e3; font-family: 'Segoe UI', sans-serif; }
        .sidebar { background-color: #1e1f20; }
        .chat-input { background-color: #1e1f20; border-radius: 28px; }
        .active-chat { background-color: #333537; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <!-- Barra Lateral -->
    <aside class="sidebar w-64 flex flex-col p-4">
        <button onclick="newChat()" class="w-full py-3 px-4 rounded-full flex items-center gap-3 mb-6 bg-[#333537] hover:bg-[#3f4143] transition">
            <i class="fa-solid fa-plus"></i> <span>Nuevo chat</span>
        </button>
        <div class="flex-1 overflow-y-auto" id="chat-history">
            <p class="text-xs font-semibold text-gray-500 mb-4 px-2">Recientes</p>
        </div>
        <div class="mt-auto pt-4 border-t border-gray-700 text-blue-400 font-bold">OpenGemini</div>
    </aside>

    <!-- Contenido Principal -->
    <main class="flex-1 flex flex-col relative">
        <header class="p-4 flex justify-between items-center">
            <select id="model-select" class="bg-transparent text-xl font-medium outline-none cursor-pointer">
                <option value="gemini-1.5-flash" class="bg-[#1e1f20]">Gemini Fast</option>
                <option value="gemini-exp-reasoning" class="bg-[#1e1f20]">Gemini Reasoning</option>
                <option value="gemini-1.5-pro" class="bg-[#1e1f20]">Gemini Pro</option>
            </select>
        </header>

        <div id="chat-window" class="flex-1 overflow-y-auto px-4 md:px-20 py-10 space-y-6">
            <div class="text-center mt-20"><h1 class="text-4xl font-medium">¿En qué puedo ayudarte?</h1></div>
        </div>

        <div class="p-4 md:px-20 pb-8">
            <div class="chat-input flex items-center px-6 py-3 max-w-4xl mx-auto border border-transparent focus-within:border-gray-600">
                <input id="user-input" type="text" placeholder="Escribe aquí..." class="bg-transparent flex-1 outline-none">
                <button onclick="sendMessage()" class="ml-4 text-blue-400"><i class="fa-solid fa-paper-plane text-xl"></i></button>
            </div>
        </div>
    </main>

    <script>
        let chats = JSON.parse(localStorage.getItem('chats')) || [];
        let currentChatId = null;

        function renderHistory() {
            const container = document.getElementById('chat-history');
            container.innerHTML = '<p class="text-xs font-semibold text-gray-500 mb-4 px-2">Recientes</p>';
            chats.forEach(chat => {
                const div = document.createElement('div');
                div.className = `group flex items-center justify-between p-2 rounded-lg cursor-pointer hover:bg-[#333537] ${chat.id === currentChatId ? 'active-chat' : ''}`;
                div.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden" onclick="loadChat('${chat.id}')">
                        <i class="fa-regular fa-message text-sm"></i>
                        <span class="truncate text-sm">${chat.title}</span>
                    </div>
                    <div class="hidden group-hover:flex gap-2">
                        <i class="fa-solid fa-pen text-xs" onclick="renameChat('${chat.id}')"></i>
                        <i class="fa-solid fa-trash text-xs" onclick="deleteChat('${chat.id}')"></i>
                    </div>`;
                container.appendChild(div);
            });
        }

        function newChat() {
            currentChatId = Date.now().toString();
            chats.unshift({ id: currentChatId, title: 'Nuevo chat', messages: [] });
            save(); renderHistory(); clearWindow();
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;
            if (!currentChatId) newChat();

            const chat = chats.find(c => c.id === currentChatId);
            if (chat.messages.length === 0) chat.title = text.substring(0, 20);
            
            chat.messages.push({ role: 'user', content: text });
            input.value = '';
            
            // Aquí llamarías a tu API
            chat.messages.push({ role: 'ai', content: "Respuesta de IA conectada a " + document.getElementById('model-select').value });
            
            save(); renderHistory(); displayMessages(chat.messages);
        }

        function displayMessages(msgs) {
            const win = document.getElementById('chat-window');
            win.innerHTML = msgs.map(m => `<div class="max-w-3xl mx-auto ${m.role === 'user' ? 'text-right' : ''}"><div class="inline-block p-4 rounded-2xl ${m.role === 'user' ? 'bg-[#333537]' : 'w-full'}">${m.content}</div></div>`).join('');
            win.scrollTo(0, win.scrollHeight);
        }

        function loadChat(id) { currentChatId = id; displayMessages(chats.find(c => c.id === id).messages); renderHistory(); }
        function renameChat(id) { const n = prompt("Nuevo nombre:"); if(n){ chats.find(c => c.id === id).title = n; save(); renderHistory(); } }
        function deleteChat(id) { chats = chats.filter(c => c.id !== id); save(); renderHistory(); }
        function clearWindow() { document.getElementById('chat-window').innerHTML = '<h1 class="text-4xl text-center mt-20">¿En qué puedo ayudarte?</h1>'; }
        function save() { localStorage.setItem('chats', JSON.stringify(chats)); }
        renderHistory();
    </script>
</body>
</html>
