<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>domke.com | PNG Converter</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 40px; border-radius: 20px; border: 1px solid #334155; text-align: center; max-width: 400px; }
        h1 { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
        .upload-btn { background: #0ea5e9; padding: 12px 24px; border-radius: 8px; cursor: pointer; display: inline-block; transition: 0.3s; font-weight: bold; }
        .upload-btn:hover { background: #0284c7; transform: translateY(-2px); }
        #preview { margin-top: 20px; max-width: 100%; border-radius: 10px; display: none; border: 2px solid #334155; }
        #downloadBtn { display: none; margin-top: 20px; color: #38bdf8; text-decoration: none; font-weight: bold; border: 1px solid #38bdf8; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>domke.com</h1>
        <p>Conversor universal a <b>PNG</b></p>
        <label for="fileInput" class="upload-btn">Elegir Archivo</label>
        <input type="file" id="fileInput" style="display:none" accept="image/*">
        <canvas id="canvas" style="display:none;"></canvas>
        <img id="preview">
        <br>
        <a id="downloadBtn">Descargar PNG</a>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const canvas = document.getElementById('canvas');
        const preview = document.getElementById('preview');
        const downloadBtn = document.getElementById('downloadBtn');
        const ctx = canvas.getContext('2d');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                    const dataUrl = canvas.toDataURL('image/png');
                    preview.src = dataUrl;
                    preview.style.display = 'block';
                    downloadBtn.href = dataUrl;
                    downloadBtn.download = `domkecom-${Date.now()}.png`;
                    downloadBtn.style.display = 'inline-block';
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
