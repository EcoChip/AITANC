<!DOCTYPE html>
<html>
<head>
    <title>Enigma Cracker Pro</title>
    <style>
        body { background: #1a1a1a; color: #ff4444; font-family: monospace; padding: 20px; }
        textarea, input { background: #000; border: 1px solid #ff4444; color: #ff4444; width: 100%; padding: 10px; margin: 10px 0; }
        button { background: #ff4444; color: #000; border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; }
        .result { border-bottom: 1px solid #333; padding: 5px; }
    </style>
</head>
<body>
    <h2>🕵️‍♂️ CRACKER ESPECÍFICO</h2>
    <p>Mensaje encriptado (ej: 9# ) :</p>
    <textarea id="cipherInput"></textarea>
    <p>Probar claves de una sola letra (A-Z):</p>
    <button onclick="crackEspecifico()">ATAQUE DE FUERZA BRUTA</button>
    <div id="results"></div>

    <script>
        const alfabeto = "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ0123456789 .,!?;:()@#+-*/=";

        function crackEspecifico() {
            const input = document.getElementById('cipherInput').value.toUpperCase();
            let html = "";

            // Probamos cada letra del alfabeto como si fuera la MASTER KEY
            for (let k = 0; k < alfabeto.length; k++) {
                let masterKey = alfabeto[k];
                let resultado = "";
                
                // Replicamos tu lógica de keySum
                let keySum = k; 

                for (let i = 0; i < input.length; i++) {
                    let char = input[i];
                    let index = alfabeto.indexOf(char);

                    if (index === -1) { resultado += char; continue; }

                    // Revertimos el Reflector
                    let shift = (alfabeto.length - 1) - index;
                    
                    // Revertimos el desplazamiento dinámico
                    // (Añadimos alfabeto.length varias veces para que el % no de negativo)
                    let originalIndex = (shift - keySum - (1 * i)) % alfabeto.length;
                    while (originalIndex < 0) originalIndex += alfabeto.length;

                    resultado += alfabeto[originalIndex];
                }
                html += `<div class="result"><b>Con clave "${masterKey}":</b> ${resultado}</div>`;
            }
            document.getElementById('results').innerHTML = html;
        }
    </script>
</body>
</html>
