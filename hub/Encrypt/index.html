<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mini Enigma Machine</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #222; color: #0f0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .machine { background: #333; border: 5px solid #555; padding: 20px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 400px; }
        h1 { text-align: center; color: #aaa; text-transform: uppercase; letter-spacing: 5px; }
        .setting { margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; color: #fff; }
        input[type="number"] { width: 50px; background: #444; border: 1px solid #0f0; color: #0f0; padding: 5px; }
        textarea { width: 100%; height: 100px; background: #111; color: #0f0; border: 1px solid #0f0; padding: 10px; box-sizing: border-box; resize: none; font-size: 1.2rem; }
        .info { margin-top: 15px; font-size: 0.8rem; color: #888; }
        .light { color: yellow; font-weight: bold; }
    </style>
</head>
<body>

<h1>ENIGMA M4</h1>

<div class="machine">
    <div class="setting">
        <span>POSICIÓN ROTOR (CLAVE):</span>
        <input type="number" id="rotor" value="1" min="1" max="26">
    </div>

    <p>ENTRADA (Escribe tu mensaje):</p>
    <textarea id="input" oninput="cifrar()" placeholder="ESCRIBE AQUÍ..."></textarea>

    <p>SALIDA (Resultado):</p>
    <textarea id="output" readonly></textarea>

    <div class="info">
        * Al igual que la Enigma real, la misma configuración sirve para <b>cifrar</b> y <b>descifrar</b>. <br><br>
        * <span class="light">REGLA DE ORO:</span> Si tu amigo no tiene el mismo número de rotor, solo verá basura.
    </div>
</div>

<script>
    const alfabeto = "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ ";
    
    function cifrar() {
        const rotorPos = parseInt(document.getElementById('rotor').value);
        const input = document.getElementById('input').value.toUpperCase();
        let resultado = "";

        for (let i = 0; i < input.length; i++) {
            let char = input[i];
            let index = alfabeto.indexOf(char);

            if (index === -1) {
                resultado += char; // Mantener caracteres raros
                continue;
            }

            // Simulación de paso por rotor y reflector simple
            // La clave "mueve" el alfabeto de forma dinámica
            let shift = (index + rotorPos + i) % alfabeto.length;
            let charCifrado = alfabeto[shift];
            
            // Simulación de Reflector (vuelve el mensaje sobre sí mismo)
            let reflectorIndex = (alfabeto.length - 1) - shift;
            resultado += alfabeto[reflectorIndex];
        }

        document.getElementById('output').value = resultado;
    }
</script>

</body>
</html>
