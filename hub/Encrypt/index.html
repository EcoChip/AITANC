<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Enigma Master 3000</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: #e0e0e0; display: flex; justify-content: center; padding: 20px; }
        .machine { background: #2d2d2d; border: 2px solid #444; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 450px; }
        h2 { text-align: center; color: #00ff88; text-transform: uppercase; margin-top: 0; }
        .field { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #aaa; }
        input, textarea { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #444; color: #00ff88; border-radius: 8px; box-sizing: border-box; font-family: monospace; }
        textarea { height: 80px; resize: none; font-size: 1.1rem; }
        .btn-copy { background: #00ff88; color: #1a1a1a; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn-copy:hover { background: #00cc6e; }
        .key-info { font-size: 0.8rem; color: #777; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="machine">
    <h2>Enigma Ultra</h2>
    
    <div class="field">
        <label>🔑 PALABRA CLAVE (La clave secreta):</label>
        <input type="text" id="masterKey" oninput="cifrar()" placeholder="Ej: MANZANA77">
    </div>

    <div class="field">
        <label>📥 MENSAJE ORIGINAL / CIFRADO:</label>
        <textarea id="input" oninput="cifrar()" placeholder="Escribe aquí..."></textarea>
    </div>

    <div class="field">
        <label>📤 RESULTADO:</label>
        <textarea id="output" readonly></textarea>
        <button class="btn-copy" onclick="copiar()">📋 COPIAR RESULTADO</button>
    </div>

    <p class="key-info">Comparte la <b>Palabra Clave</b> por separado para que el receptor pueda leer el mensaje.</p>
</div>

<script>
    const alfabeto = "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ0123456789 .,!?;:()@#+-*/=";
    
    function cifrar() {
        const key = document.getElementById('masterKey').value.toUpperCase() || "A";
        const input = document.getElementById('input').value.toUpperCase();
        let resultado = "";

        // Generamos un "valor de semilla" basado en la palabra clave
        let keySum = 0;
        for(let i=0; i<key.length; i++) keySum += alfabeto.indexOf(key[i]);

        for (let i = 0; i < input.length; i++) {
            let char = input[i];
            let index = alfabeto.indexOf(char);

            if (index === -1) {
                resultado += char;
                continue;
            }

            // Algoritmo de desplazamiento dinámico basado en la clave y la posición
            let shift = (index + keySum + (key.length * i)) % alfabeto.length;
            
            // Efecto Reflector (hace que cifrar y descifrar sea el mismo proceso)
            let reflectorIndex = (alfabeto.length - 1) - shift;
            if (reflectorIndex < 0) reflectorIndex += alfabeto.length;
            
            resultado += alfabeto[reflectorIndex];
        }
        document.getElementById('output').value = resultado;
    }

    function copiar() {
        const copyText = document.getElementById("output");
        copyText.select();
        document.execCommand("copy");
        alert("¡Copiado al portapapeles!");
    }
</script>

</body>
</html>
