<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AITANC | Procesar facturas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #000000; color: #ffffff; padding: 40px 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, #007bff, #00c6ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn { background: linear-gradient(135deg, #007bff, #00c6ff); padding: 12px 28px; border-radius: 50px; color: white; font-weight: 600; border: none; cursor: pointer; transition: 0.3s; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,123,255,0.3); }
        .btn-outline { background: transparent; border: 1px solid #007bff; }
        .card { background: #0a0a0a; border-radius: 30px; padding: 30px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 30px; }
        .upload-area { border: 2px dashed rgba(255,255,255,0.2); border-radius: 20px; padding: 40px; text-align: center; cursor: pointer; margin-bottom: 20px; }
        .upload-area:hover { border-color: #007bff; background: rgba(0,123,255,0.05); }
        .file-list { margin-top: 20px; max-height: 200px; overflow-y: auto; }
        .file-item { background: #1a1a1a; padding: 10px 15px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .progress-bar { width: 100%; height: 6px; background: #1a1a1a; border-radius: 10px; overflow: hidden; margin: 20px 0; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #007bff, #00c6ff); transition: width 0.3s; }
        .result-area { background: #111; border-radius: 20px; padding: 20px; max-height: 400px; overflow-y: auto; font-size: 0.85rem; }
        .counter { background: #1a1a1a; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .counter-value { font-size: 2rem; font-weight: 700; color: #007bff; }
        @media (max-width: 768px) { .header { flex-direction: column; gap: 15px; } }
    </style>
    
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getFirestore, doc, getDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
        
        const firebaseConfig = {
            apiKey: "AIzaSyDxsR6Y265FgDtZNllbCje8JG7njcmymK4",
            authDomain: "users-aitanc.firebaseapp.com",
            projectId: "users-aitanc",
            storageBucket: "users-aitanc.firebasestorage.app",
            messagingSenderId: "123745859673",
            appId: "1:123745859673:web:7a57f30f089356567c9948"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const WORKER_URL = 'https://aitancgeminiproxyv2.nda941237.workers.dev';
        
        let currentUser = null;
        let userData = null;
        let selectedFiles = [];
        
        // Elementos
        const usedSpan = document.getElementById('used');
        const maxSpan = document.getElementById('max');
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileListDiv = document.getElementById('fileList');
        const processBtn = document.getElementById('processBtn');
        const progressBar = document.getElementById('progressFill');
        const resultDiv = document.getElementById('result');
        
        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = '/'; return; }
            currentUser = user;
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (!userDoc.exists()) { window.location.href = '/'; return; }
            userData = userDoc.data();
            usedSpan.textContent = userData.facturas_usadas || 0;
            maxSpan.textContent = userData.facturas_max || 5;
        });
        
        uploadArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            selectedFiles = Array.from(e.target.files);
            renderFileList();
        });
        
        function renderFileList() {
            if (selectedFiles.length === 0) {
                fileListDiv.innerHTML = '<p style="color: #aaa;">No hay archivos seleccionados</p>';
                return;
            }
            fileListDiv.innerHTML = selectedFiles.map((file, idx) => `
                <div class="file-item">
                    <span>📄 ${file.name} (${(file.size / 1024).toFixed(1)} KB)</span>
                    <button class="btn-outline btn" style="padding: 5px 12px;" onclick="removeFile(${idx})">Eliminar</button>
                </div>
            `).join('');
        }
        
        window.removeFile = (idx) => {
            selectedFiles.splice(idx, 1);
            renderFileList();
            fileInput.value = '';
        };
        
        window.processInvoices = async () => {
            if (!userData) { alert('Cargando usuario...'); return; }
            if (selectedFiles.length === 0) { alert('Selecciona al menos una factura.'); return; }
            
            const nuevasUsadas = (userData.facturas_usadas || 0) + selectedFiles.length;
            if (nuevasUsadas > (userData.facturas_max || 5)) {
                alert(`Has superado el límite de tu plan (${userData.facturas_max} facturas). Contrata más capacidad.`);
                return;
            }
            
            processBtn.disabled = true;
            processBtn.textContent = 'Procesando...';
            progressBar.style.width = '0%';
            resultDiv.innerHTML = '<p style="color: #aaa;">Enviando al motor IA...</p>';
            
            const formData = new FormData();
            for (const file of selectedFiles) formData.append('files', file);
            
            try {
                const response = await fetch(WORKER_URL, { method: 'POST', body: formData });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (!data || !data.resultados || !data.resumen) throw new Error('Estructura inválida');
                
                const { resultados, resumen } = data;
                resultDiv.innerHTML = `
                    <div style="background: #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 20px;">
                        <h4>📊 Resumen ejecutivo</h4>
                        <p>📄 Total facturas: ${resumen.total_facturas || 0}</p>
                        <p>💰 Base imponible total: ${(resumen.total_base || 0).toFixed(2)} €</p>
                        <p>🧾 Impuestos totales: ${(resumen.total_impuestos || 0).toFixed(2)} €</p>
                        <p>📦 Extras detectados: ${(resumen.total_extras || 0).toFixed(2)} €</p>
                        <p>💶 Total real facturado: ${(resumen.total_real || 0).toFixed(2)} €</p>
                        <p>⚠️ Facturas con errores: ${resumen.facturas_con_error || 0}</p>
                    </div>
                    <div id="detalleResultados"></div>
                `;
                document.getElementById('detalleResultados').innerHTML = resultados.map(r => `
                    <div style="margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px;">
                        <strong>📄 ${r.Archivo}</strong><br>
                        Status: ${r.Status}<br>
                        Emisor: ${r.Emisor || 'N/A'}<br>
                        ID: ${r.ID_Factura || 'N/A'}<br>
                        Fecha: ${r.Fecha || 'N/A'}<br>
                        Base: ${(r["Base (€)"] || 0).toFixed(2)} €<br>
                        Impuestos: ${(r["Impuestos (€)"] || 0).toFixed(2)} €<br>
                        Extras: ${(r["Extras/Envío (€)"] || 0).toFixed(2)} €<br>
                        Total Real: ${(r["Total Real (€)"] || 0).toFixed(2)} €<br>
                        <span style="color: ${r.Status.includes('OK') ? '#2ecc71' : '#ff6b6b'}">${r.Info_Auditoría || ''}</span>
                    </div>
                `).join('');
                
                generarExcel(resultados, resumen);
                
                await updateDoc(doc(db, 'users', currentUser.uid), { facturas_usadas: nuevasUsadas });
                userData.facturas_usadas = nuevasUsadas;
                usedSpan.textContent = nuevasUsadas;
                progressBar.style.width = '100%';
                setTimeout(() => progressBar.style.width = '0%', 1000);
            } catch (error) {
                resultDiv.innerHTML = `<div style="color: #ff6b6b;">Error: ${error.message}</div>`;
            } finally {
                processBtn.disabled = false;
                processBtn.textContent = 'Procesar facturas';
            }
        };
        
        function generarExcel(resultados, resumen) {
            const detalleRows = resultados.map(r => [r.Archivo, r.Status, r.Emisor || '', r.ID_Factura || '', r.Fecha || '',
                r.Moneda || '', r["Base (€)"] || 0, r["Impuestos (€)"] || 0, r["Extras/Envío (€)"] || 0, r["Total Real (€)"] || 0, r.Info_Auditoría || '']);
            detalleRows.unshift(['Archivo', 'Status', 'Emisor', 'ID_Factura', 'Fecha', 'Moneda', 'Base (€)', 'Impuestos (€)', 'Extras/Envío (€)', 'Total Real (€)', 'Info Auditoría']);
            const resumenRows = [['Métrica', 'Valor'], ['Total facturas', resumen.total_facturas], ['Total Base Imponible', resumen.total_base], ['Total Impuestos', resumen.total_impuestos], ['Total Extras/Envío', resumen.total_extras], ['Total Real Facturado', resumen.total_real], ['Facturas con errores', resumen.facturas_con_error]];
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(detalleRows), 'Detalle');
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(resumenRows), 'Resumen Ejecutivo');
            XLSX.writeFile(wb, `facturas_${new Date().toISOString().slice(0,19)}.xlsx`);
        }
        
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.borderColor = '#007bff'; });
        uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = 'rgba(255,255,255,0.2)'; });
        uploadArea.addEventListener('drop', (e) => { e.preventDefault(); uploadArea.style.borderColor = 'rgba(255,255,255,0.2)'; selectedFiles = Array.from(e.dataTransfer.files); renderFileList(); });
    </script>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">AITANC | Procesar facturas</div>
        <button class="btn-outline btn" onclick="window.location.href='/prime/'">← Volver al panel</button>
    </div>
    
    <div class="counter">
        📊 Facturas usadas este mes: <span class="counter-value" id="used">0</span> / <span id="max">0</span>
    </div>
    
    <div class="card">
        <div class="upload-area" id="uploadArea">
            <div>📁 Haz clic o arrastra archivos aquí</div>
            <div style="font-size: 0.8rem; color: #888;">JPG, PNG, PDF</div>
            <input type="file" id="fileInput" multiple accept="image/jpeg,image/png,application/pdf" style="display:none;">
        </div>
        <div id="fileList" class="file-list"><p style="color: #aaa;">No hay archivos seleccionados</p></div>
        <button class="btn" id="processBtn" onclick="processInvoices()" style="width:100%;">Procesar facturas</button>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    
    <div class="card">
        <h3>📊 Resultados de la extracción</h3>
        <div id="result" class="result-area"><p style="color: #aaa;">Los datos extraídos aparecerán aquí y se descargará automáticamente un Excel.</p></div>
    </div>
</div>
</body>
</html>
